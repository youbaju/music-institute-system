<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الطالب — معهد الأنغام الموسيقي</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <svg class="rosette" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:26px;height:26px;">
        <circle cx="50" cy="50" r="46" stroke="#c89b3c" stroke-width="2"/>
        <circle cx="50" cy="50" r="6" fill="#c89b3c"/>
      </svg>
      <div>
        <h2 id="brandName">معهد بيت المواهب</h2>
        <span>بوابة الطالب</span>
      </div>
    </div>
    <button class="nav-item active" data-view="schedule">🗓️ جدولي الأسبوعي</button>
    <button class="nav-item" data-view="attendance">✅ سجل الحضور</button>
    <button class="nav-item" data-view="invoices">💳 الفواتير</button>
    <div class="sidebar-footer">
      <button class="btn-secondary btn-sm" style="width:100%;" id="btnLogout">تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1 id="viewTitle">جدولي الأسبوعي</h1>
      <span class="role-tag" id="studentTag">طالب</span>
    </div>

    <section class="view active" id="view-schedule">
      <div class="card"><div class="schedule-grid" id="myScheduleGrid"></div></div>
    </section>

    <section class="view" id="view-attendance">
      <div class="card"><div id="myAttendanceTable"></div></div>
    </section>

    <section class="view" id="view-invoices">
      <div class="card"><div id="myInvoicesTable"></div></div>
    </section>
  </main>
</div>

<script type="module" src="js/student.js"></script>
</body>
</html>
