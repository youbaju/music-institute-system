<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زرع البيانات التجريبية — معهد بيت المواهب</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-card" style="max-width: 520px;">
    <svg class="rosette" style="margin:0 auto;" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="46" stroke="#c89b3c" stroke-width="1.5"/>
      <circle cx="50" cy="50" r="6" fill="#c89b3c"/>
    </svg>
    <h1>زرع البيانات التجريبية</h1>
    <p class="sub">صفحة لمرة واحدة فقط — تنشئ إعدادات المعهد وكل البيانات التجريبية مباشرة في Firestore دون أي تعبئة يدوية.</p>

    <div id="status" style="text-align:right; font-size:14px; color:var(--ink-dim); margin-bottom:18px; min-height:24px;"></div>

    <button class="btn-primary" id="btnSeed" style="width:100%;">🌱 ابدأ زرع البيانات الآن</button>

    <p style="font-size:12.5px; color:var(--ink-dim); margin-top:18px;">
      بعد الانتهاء، احذف هذا الملف (<code>seed.html</code>) من مستودعك على GitHub لأنه لن يكون مطلوباً مرة أخرى.
    </p>
  </div>
</div>

<script type="module">
  import { getRepository } from "./js/repository/index.js";

  const SETTINGS = {
    id: "general",
    instituteName: "معهد بيت المواهب",
    currency: "ر.س",
    workDays: ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس"],
    workHoursFrom: "16:00",
    workHoursTo: "21:00",
    billingModel: "monthly",
    instruments: [
      { id: "oud", name: "عود", monthlyFee: 350 },
      { id: "piano", name: "بيانو", monthlyFee: 400 },
      { id: "organ", name: "أورغ", monthlyFee: 300 },
      { id: "violin", name: "كمان", monthlyFee: 380 },
      { id: "qanun", name: "قانون", monthlyFee: 420 },
    ],
  };

  const GUARDIANS = [
    { id: "g1", name: "أبو خالد", phone: "0501112233" },
    { id: "g2", name: "أم سارة", phone: "0502223344" },
    { id: "g3", name: "أبو ريان", phone: "0503334455" },
  ];

  const STUDENTS = [
    { id: "s1", name: "خالد الحربي", age: 12, guardianId: "g1", guardianName: "أبو خالد", phone: "0501112233", instrumentId: "oud", status: "active", createdAt: "2026-04-01" },
    { id: "s2", name: "سارة العتيبي", age: 15, guardianId: "g2", guardianName: "أم سارة", phone: "0502223344", instrumentId: "piano", status: "active", createdAt: "2026-03-15" },
    { id: "s3", name: "ريان القحطاني", age: 10, guardianId: "g3", guardianName: "أبو ريان", phone: "0503334455", instrumentId: "organ", status: "suspended", createdAt: "2026-02-10" },
    { id: "s4", name: "نورة العتيبي", age: 17, guardianId: "g2", guardianName: "أم سارة", phone: "0502223344", instrumentId: "violin", status: "active", createdAt: "2026-05-01" },
  ];

  const TEACHERS = [
    { id: "t1", name: "أ. محمد الزهراني", instrumentId: "oud", phone: "0555001122" },
    { id: "t2", name: "أ. لينا فارس", instrumentId: "piano", phone: "0555003344" },
    { id: "t3", name: "أ. عبدالله الشمري", instrumentId: "organ", phone: "0555005566" },
    { id: "t4", name: "أ. هند المطيري", instrumentId: "violin", phone: "0555007788" },
  ];

  const CLASSES = [
    { id: "c1", studentId: "s1", teacherId: "t1", dayOfWeek: "الأحد", time: "16:00", duration: 45, room: "قاعة 1" },
    { id: "c2", studentId: "s2", teacherId: "t2", dayOfWeek: "الاثنين", time: "17:00", duration: 60, room: "قاعة 2" },
    { id: "c3", studentId: "s3", teacherId: "t3", dayOfWeek: "الثلاثاء", time: "16:30", duration: 45, room: "قاعة 1" },
    { id: "c4", studentId: "s4", teacherId: "t4", dayOfWeek: "الأربعاء", time: "18:00", duration: 45, room: "قاعة 3" },
  ];

  const INVOICES = [
    { id: "i1", studentId: "s1", amount: 350, month: "2026-07", status: "unpaid", dueDate: "2026-07-05" },
    { id: "i2", studentId: "s2", amount: 400, month: "2026-07", status: "paid", dueDate: "2026-07-05" },
    { id: "i3", studentId: "s4", amount: 380, month: "2026-07", status: "unpaid", dueDate: "2026-07-05" },
  ];

  const statusEl = document.getElementById("status");
  function log(msg) {
    statusEl.innerHTML += `<div>${msg}</div>`;
  }

  document.getElementById("btnSeed").addEventListener("click", async () => {
    document.getElementById("btnSeed").disabled = true;
    statusEl.innerHTML = "";
    try {
      log("⏳ جاري زرع إعدادات المعهد...");
      await getRepository("settings").setSingleton("general", SETTINGS);
      log("✅ إعدادات المعهد تمت (اسم المعهد: معهد بيت المواهب)");

      log("⏳ جاري زرع أولياء الأمور...");
      for (const g of GUARDIANS) await getRepository("guardians").add(g);
      log("✅ تم زرع " + GUARDIANS.length + " ولي أمر");

      log("⏳ جاري زرع الطلاب...");
      for (const s of STUDENTS) await getRepository("students").add(s);
      log("✅ تم زرع " + STUDENTS.length + " طالب");

      log("⏳ جاري زرع المعلمين...");
      for (const t of TEACHERS) await getRepository("teachers").add(t);
      log("✅ تم زرع " + TEACHERS.length + " معلم");

      log("⏳ جاري زرع الحصص...");
      for (const c of CLASSES) await getRepository("classes").add(c);
      log("✅ تم زرع " + CLASSES.length + " حصة");

      log("⏳ جاري زرع الفواتير...");
      for (const i of INVOICES) await getRepository("invoices").add(i);
      log("✅ تم زرع " + INVOICES.length + " فاتورة");

      log("<br><strong style='color:var(--gold-bright);'>🎉 اكتمل الزرع بنجاح! افتح الموقع الرئيسي الآن.</strong>");
    } catch (err) {
      log("<br><strong style='color:#d98f83;'>❌ حدث خطأ: " + err.message + "</strong>");
      document.getElementById("btnSeed").disabled = false;
    }
  });
</script>
</body>
</html>
